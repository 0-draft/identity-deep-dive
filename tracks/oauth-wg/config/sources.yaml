github:
  api_base: https://api.github.com
  org: oauth-wg
  repo_pages: 5
  search_max_pages: 5
  events_pages: 1
  # repos[] is intentionally empty: discovery is org-wide via /orgs/oauth-wg/repos.
  repos: []

datatracker:
  api_base: https://datatracker.ietf.org
  group_acronym: oauth
  active_drafts_url: https://datatracker.ietf.org/api/v1/doc/document/?group__acronym=oauth&name__contains=draft-ietf-oauth-&states=1&limit=200&format=json
  group_url: https://datatracker.ietf.org/api/v1/group/group/?acronym=oauth&format=json
  states_url: https://datatracker.ietf.org/api/v1/doc/state/?format=json&limit=1000
  documents_html_url: https://datatracker.ietf.org/wg/oauth/documents/
  meetings_html_url: https://datatracker.ietf.org/wg/oauth/meetings/

mailarchive:
  list: oauth
  browse_url: https://mailarchive.ietf.org/arch/browse/oauth/
  max_messages: 300
