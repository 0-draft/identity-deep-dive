# Scoring configuration.
# Tune these weights and thresholds for your domain.

settings:
  top_n: 12
  deep_dive_threshold: 8.0

recency_points:
  - within_days: 7
    points: 5
  - within_days: 30
    points: 3
  - within_days: 90
    points: 1
  - within_days: 99999
    points: 0

weights:
  draft_update: 5
  new_draft: 4
  mail_topic: 3
  github_activity: 2
  keyword_bonus: 2

thresholds:
  min_candidate_score: 4

priority_keywords: []
  # - "keyword1"
  # - "keyword2"
