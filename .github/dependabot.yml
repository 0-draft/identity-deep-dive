version: 2
updates:
  # GitHub Actions used by all workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"

  # Astro web app
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(web)"
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  # Python dependencies — one entry per track
  - package-ecosystem: pip
    directory: /tracks/ietf-wimse
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ietf-wimse)"

  - package-ecosystem: pip
    directory: /tracks/oauth-wg
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(oauth-wg)"

  - package-ecosystem: pip
    directory: /tracks/openid
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(openid)"
