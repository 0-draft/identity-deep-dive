name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "tracks/**/reports/**"
      - "tracks/**/data/normalized/**"
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Resolve Pages base path
        id: pages
        uses: actions/configure-pages@v5
      - name: Build
        env:
          PAGES_SITE: ${{ steps.pages.outputs.origin }}
          PAGES_BASE: ${{ steps.pages.outputs.base_path }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
