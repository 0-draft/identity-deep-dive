name: Daily Update (All Tracks)

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      track:
        description: "Run a specific track only (leave blank for all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        track: [ietf-wimse, oauth-wg, openid]
    if: ${{ github.event.inputs.track == '' || github.event.inputs.track == matrix.track }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tracks/${{ matrix.track }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: make install
      - run: make update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit changes
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tracks/${{ matrix.track }}/
          git diff --cached --quiet || git commit -m "chore(${{ matrix.track }}): daily update $(date -u +%Y-%m-%d)"
          git push
